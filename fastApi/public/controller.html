<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apex T-Control v3</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #38bdf8;
      --accent-glow: rgba(56, 189, 248, 0.35);
      --danger: #f87171;
      --panel-bg: rgba(10, 16, 28, 0.55);
      --panel-border: rgba(56, 189, 248, 0.18);
      --text-muted: rgba(203, 213, 225, 0.65);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'JetBrains Mono', monospace;
      background: #04070d;
      color: #e2e8f0;
      min-height: 100vh;
      height: 100vh;
      overflow: hidden;
      user-select: none;
      touch-action: none;
    }

    .fs-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(4, 7, 13, 0.94);
      backdrop-filter: blur(14px);
      z-index: 50;
      transition: opacity 0.25s ease;
      opacity: 1;
    }
    .fs-overlay.hidden { opacity: 0; pointer-events: none; }
    .fs-card {
      background: rgba(10, 16, 28, 0.92);
      border: 1px solid rgba(56, 189, 248, 0.25);
      border-radius: 24px;
      padding: 36px 42px;
      max-width: 360px;
      width: 90%;
      text-align: center;
      box-shadow: 0 24px 70px rgba(8, 11, 19, 0.62);
    }
    .fs-card h2 {
      font-family: 'Orbitron', sans-serif;
      font-size: 18px;
      letter-spacing: 0.3em;
      color: #38bdf8;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .fs-card p {
      font-size: 11px;
      letter-spacing: 0.16em;
      color: rgba(148, 163, 184, 0.8);
      text-transform: uppercase;
      margin-bottom: 26px;
    }
    .fs-card button {
      padding: 12px 28px;
      border-radius: 16px;
      border: 1px solid rgba(56, 189, 248, 0.45);
      background: rgba(56, 189, 248, 0.1);
      color: #e2e8f0;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }
    .fs-card button:hover {
      background: rgba(244, 114, 182, 0.12);
      border-color: #f472b6;
      color: #f472b6;
    }

    #remote-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: saturate(1.05);
      z-index: 0;
    }
    #remote-audio { display: none; }

    .hud {
      position: relative;
      z-index: 10;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
      pointer-events: none;
    }

    .hud-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      pointer-events: none;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(8, 13, 22, 0.6);
      border: 1px solid rgba(56, 189, 248, 0.2);
      border-radius: 999px;
      padding: 6px 14px;
      backdrop-filter: blur(14px);
      pointer-events: auto;
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #475569;
      transition: background 0.3s;
      flex-shrink: 0;
    }
    .status-dot.online { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
    .status-pill-text {
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .status-pill-text strong { color: var(--accent); font-weight: 700; }

    .media-row {
      display: flex;
      gap: 8px;
      pointer-events: auto;
    }
    .media-btn {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: rgba(8, 13, 22, 0.65);
      border: 1px solid rgba(56, 189, 248, 0.28);
      color: var(--accent);
      font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(12px);
      transition: transform 0.12s, background 0.2s, opacity 0.2s;
      cursor: pointer;
    }
    .media-btn.off {
      background: rgba(15, 23, 42, 0.4);
      color: rgba(148, 163, 184, 0.8);
      border-color: rgba(148, 163, 184, 0.28);
      opacity: 0.7;
    }
    .media-btn:active { transform: scale(0.92); }

    .joystick-overlay {
      position: fixed;
      left: max(16px, env(safe-area-inset-left));
      bottom: max(16px, env(safe-area-inset-bottom));
      pointer-events: auto;
      z-index: 12;
      --joystick-size: 172px;
    }
    .joystick-zone {
      width: var(--joystick-size);
      aspect-ratio: 1;
      touch-action: none;
      user-select: none;
    }
    .joystick-zone.disabled {
      opacity: 0.35;
      pointer-events: none;
    }

    /* debug overlay */
    #debug-overlay {
      position: fixed;
      bottom: max(16px, env(safe-area-inset-bottom));
      right: max(16px, env(safe-area-inset-right));
      font-size: 10px;
      letter-spacing: 0.1em;
      color: rgba(56, 189, 248, 0.7);
      text-align: right;
      pointer-events: none;
      z-index: 20;
      line-height: 1.6;
    }

    @media (max-width: 720px) {
      .joystick-overlay { --joystick-size: 156px; }
    }
  </style>
</head>
<body>

<video id="remote-video" autoplay playsinline muted></video>
<audio id="remote-audio" autoplay playsinline></audio>

<div id="ctrlFsPrompt" class="fs-overlay">
  <div class="fs-card">
    <h2>Enter Full Screen</h2>
    <p>Click below to engage control mode</p>
    <button id="ctrlFsButton" type="button">Go Full Screen</button>
  </div>
</div>

<div class="hud">
  <div class="hud-top">
    <div class="status-pill">
      <div class="status-dot" id="status-dot"></div>
      <span class="status-pill-text">
        Latency <strong><span id="ms-val">--</span>ms</strong>
        &nbsp;|&nbsp;
        <span id="link-status">OFFLINE</span>
      </span>
    </div>
    <div class="media-row">
      <button id="btnMicSend"  class="media-btn" type="button" title="Toggle Mic Send">🎙️</button>
      <button id="btnCarAudio" class="media-btn" type="button" title="Toggle Car Audio">🔊</button>
      <button id="btnCarVideo" class="media-btn" type="button" title="Toggle Car Video">🎥</button>
    </div>
  </div>

  <div id="joystick-overlay" class="joystick-overlay">
    <div class="joystick-zone" id="joystick" aria-label="Drive joystick" role="application"></div>
  </div>
</div>

<div id="debug-overlay">
  <div>X: <span id="dbg-x">512</span> &nbsp; Y: <span id="dbg-y">512</span></div>
  <div>DIR: <span id="dbg-dir">IDLE</span></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.2/nipplejs.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════
//  CONSTANTS — mirror the ESP32 dead-zone exactly
// ═══════════════════════════════════════════════════════
const JOY_LOW    = 470;    // dead-zone lower bound (matches ESP32)
const JOY_HIGH   = 550;    // dead-zone upper bound (matches ESP32)
const JOY_CENTER = 512;    // resting position
const JOY_MAX    = 1023;   // full deflection

const HEARTBEAT_INTERVAL_MS   = 2000;
const MAX_RECONNECT_DELAY_MS  = 5000;
const SIGNAL_HEARTBEAT_MS     = 5000;
const JOYSTICK_NIPPLE_SIZE    = 76;

const WS_URL     = `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}/ctrl`;
const SIGNAL_URL = `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}/ws?role=ctrl`;

let STUN_SERVERS = [
  "stun:stunserver2025.stunprotocol.org:3478",
  "turn:USERNAME:PASSWORD@turn.example.com:3478?transport=udp"
];

// ── DOM refs ───────────────────────────────────────────
const msEl          = document.getElementById('ms-val');
const linkStatusEl  = document.getElementById('link-status');
const statusDot     = document.getElementById('status-dot');
const joystickEl    = document.getElementById('joystick');
const remoteVideo   = document.getElementById('remote-video');
const remoteAudioEl = document.getElementById('remote-audio');
const btnMicSend    = document.getElementById('btnMicSend');
const btnCarAudio   = document.getElementById('btnCarAudio');
const btnCarVideo   = document.getElementById('btnCarVideo');
const fsPrompt      = document.getElementById('ctrlFsPrompt');
const fsButton      = document.getElementById('ctrlFsButton');
const dbgX          = document.getElementById('dbg-x');
const dbgY          = document.getElementById('dbg-y');
const dbgDir        = document.getElementById('dbg-dir');

// ── State ──────────────────────────────────────────────
let socket = null, reconnectDelay = 500, reconnectTimer = null, heartbeatTimer = null;
let pendingTimes = new Map(), stopArmed = false;
let lastStatusSnapshot = { esp: false, car: false };
let errorFlashTimer = null;
let signalSocket = null, signalReady = false, signalHeartbeat = null;
let signalReconnectTimer = null, signalQueue = [];
let rtc = null, micStream = null, micSenders = [], micTransceiver = null;
let configLoaded = false, pendingIceCandidates = [];
let micPublishEnabled = true, carAudioEnabled = true, carVideoVisible = true;
let controlBootstrapped = false, controlsEnabled = false;
let joystickManager = null;
let lastSentX = JOY_CENTER, lastSentY = JOY_CENTER;

// ═══════════════════════════════════════════════════════
//  JOYSTICK AXIS CONVERSION
//  nipplejs gives vector.x / vector.y in -1..+1 and force 0..1.
//  We reproduce the Arduino analogRead 0-1023 range.
//
//  nipplejs axes:   right = +x,  up = +y
//  Arduino axes:    right = +x,  up = -y  (y=0 is top, y=1023 is bottom)
//
//  Mapping:
//    nipple x=0  → ADC 512  (center)
//    nipple x=+1 → ADC 1023 (full right)
//    nipple x=-1 → ADC 0    (full left)
//    nipple y=0  → ADC 512  (center)
//    nipple y=+1 → ADC 0    (full up / forward)
//    nipple y=-1 → ADC 1023 (full down / backward)
// ═══════════════════════════════════════════════════════
function nippleToAdc(nippleAxis, invert) {
  // nippleAxis: -1..+1,  invert flips the direction
  const v = invert ? -nippleAxis : nippleAxis;
  const adc = Math.round(JOY_CENTER + v * (JOY_MAX - JOY_CENTER));
  return Math.max(0, Math.min(JOY_MAX, adc));
}

function resolveLabel(adcX, adcY) {
  const fwd  = adcY > JOY_HIGH;
  const back = adcY < JOY_LOW;
  const left = adcX < JOY_LOW;
  const rght = adcX > JOY_HIGH;
  if (!fwd && !back && !left && !rght) return 'IDLE';
  let s = '';
  if (fwd)  s += 'F';
  if (back) s += 'B';
  if (left) s += 'L';
  if (rght) s += 'R';
  return s;
}

// ── Send joystick to server ────────────────────────────
function sendStickDrive(adcX, adcY) {
  const label = resolveLabel(adcX, adcY);

  // de-duplicate: skip if nothing changed
  if (adcX === lastSentX && adcY === lastSentY) return;
  lastSentX = adcX;
  lastSentY = adcY;

  // update debug overlay
  if (dbgX) dbgX.textContent = adcX;
  if (dbgY) dbgY.textContent = adcY;
  if (dbgDir) dbgDir.textContent = label;

  if (label === 'IDLE') {
    sendStop();
    return;
  }

  if (!sendWs({ type: 'drive_stick', x: adcX, y: adcY, label })) {
    flashError('NO LINK');
    return;
  }
  stopArmed = true;
}

// ── nipplejs callbacks ─────────────────────────────────
function destroyJoystickManager() {
  if (!joystickManager) return;
  try { joystickManager.destroy(); } catch (_) {}
  joystickManager = null;
}

function refreshJoystickManager() {
  destroyJoystickManager();
  if (!window.nipplejs || !joystickEl) return;

  joystickManager = window.nipplejs.create({
    zone:        joystickEl,
    mode:        'static',
    position:    { left: '50%', top: '50%' },
    size:        JOYSTICK_NIPPLE_SIZE,
    color:       'white',
    fadeTime:    0,
    restOpacity: 0.55,
    restJoystick: true,
    dynamicPage: true,
  });

  joystickManager.on('move', (_evt, data) => {
    if (!controlsEnabled || !data) return;
    const v     = data.vector || { x: 0, y: 0 };
    const force = Math.min(1, Math.max(0, Number(data.force) || 0));

    // apply force magnitude to each axis
    const nx = Math.max(-1, Math.min(1, Number(v.x) * force));
    const ny = Math.max(-1, Math.min(1, Number(v.y) * force));

    // convert to 0-1023 ADC values
    // nipple right (+x) → ADC high (right turn)   → no invert on x
    // nipple up   (+y) → ADC low  (forward)        → invert y
    const adcX = nippleToAdc(nx, false);
    const adcY = nippleToAdc(ny, true);   // y inverted: up = forward = low ADC

    sendStickDrive(adcX, adcY);
  });

  joystickManager.on('end', () => {
    lastSentX = JOY_CENTER;
    lastSentY = JOY_CENTER;
    if (dbgX)   dbgX.textContent  = JOY_CENTER;
    if (dbgY)   dbgY.textContent  = JOY_CENTER;
    if (dbgDir) dbgDir.textContent = 'IDLE';
    if (stopArmed) sendStop();
  });
}

// ═══════════════════════════════════════════════════════
//  WEBSOCKET CONTROL CHANNEL  (unchanged from original)
// ═══════════════════════════════════════════════════════
function wsReady() {
  return socket && socket.readyState === WebSocket.OPEN;
}

function sendWs(payload) {
  if (!wsReady()) return false;
  try { socket.send(JSON.stringify(payload)); return true; }
  catch (err) { console.error('WS send failed', err); return false; }
}

function sendStop(force = false) {
  if (!force && !stopArmed) return;
  stopArmed = false;
  if (!wsReady()) return;
  recordLatency('stop');
  sendWs({ type: 'stop' });
}

function recordLatency(key)   { pendingTimes.set(key, performance.now()); }
function fulfillLatency(key)  {
  const start = pendingTimes.get(key);
  if (start) { msEl.textContent = Math.max(1, Math.round(performance.now() - start)); pendingTimes.delete(key); }
}

function setLinkDisplay(text, online = false) {
  linkStatusEl.textContent = text;
  statusDot.classList.toggle('online', online);
}

function applyLinkStatus() {
  if (!wsReady()) { setLinkDisplay('OFFLINE', false); setControlsEnabled(false); return; }
  const missing = [];
  if (!lastStatusSnapshot.esp) missing.push('ESP');
  if (!lastStatusSnapshot.car) missing.push('CAR');
  if (missing.length === 0) { setLinkDisplay('ONLINE', true); setControlsEnabled(true); }
  else { setLinkDisplay(`WAITING ${missing.join('+')}`, false); setControlsEnabled(false); }
}

function flashError(reason) {
  clearTimeout(errorFlashTimer);
  linkStatusEl.textContent = `ERR: ${reason}`;
  linkStatusEl.style.color = '#f87171';
  errorFlashTimer = setTimeout(() => { linkStatusEl.style.color = ''; applyLinkStatus(); }, 2000);
}

function setControlsEnabled(enabled) {
  controlsEnabled = enabled;
  joystickEl.classList.toggle('disabled', !enabled);
  joystickEl.setAttribute('aria-disabled', String(!enabled));
  if (!enabled && stopArmed) sendStop();
}

function connectCtrl() {
  clearTimeout(reconnectTimer);
  if (socket && socket.readyState === WebSocket.CONNECTING) return;
  if (wsReady()) return;
  setLinkDisplay('CONNECTING…', false);
  socket = new WebSocket(WS_URL);

  socket.addEventListener('open', () => {
    reconnectDelay = 500;
    msEl.textContent = '--';
    setControlsEnabled(false);
    sendWs({ type: 'hello', client: 'controller', version: '3.0' });
    sendWs({ type: 'status' });
    heartbeatTimer = setInterval(() => sendWs({ type: 'heartbeat' }), HEARTBEAT_INTERVAL_MS);
  });

  socket.addEventListener('message', (event) => {
    try { handleMessage(JSON.parse(event.data)); } catch (err) { console.error('Bad payload', err); }
  });

  socket.addEventListener('close', () => {
    clearInterval(heartbeatTimer); heartbeatTimer = null;
    msEl.textContent = '--'; stopArmed = false;
    pendingTimes.clear(); applyLinkStatus(); scheduleReconnect();
  });

  socket.addEventListener('error', (err) => { console.warn('WS error', err); socket.close(); });
}

function scheduleReconnect() {
  if (reconnectTimer) return;
  setLinkDisplay('OFFLINE', false);
  reconnectTimer = setTimeout(() => {
    reconnectTimer = null;
    reconnectDelay = Math.min(reconnectDelay * 1.5, MAX_RECONNECT_DELAY_MS);
    connectCtrl();
  }, reconnectDelay);
}

function handleMessage(payload) {
  switch ((payload.type || '').toLowerCase()) {
    case 'ack':    handleAck(payload);    break;
    case 'status': handleStatus(payload); break;
    case 'error':  flashError(payload.reason || 'UNKNOWN'); break;
  }
}

function handleAck(payload) {
  fulfillLatency(payload.cmd);
  if (payload.status !== 'ok') {
    flashError(payload.reason || 'FAILED');
    if (payload.cmd === 'drive_stick' || payload.cmd === 'stop') stopArmed = false;
    return;
  }
  if (payload.cmd === 'stop') stopArmed = false;
  applyLinkStatus();
}

function handleStatus(payload) {
  lastStatusSnapshot = { esp: !!payload.esp?.connected, car: !!payload.car?.connected };
  applyLinkStatus();
}

// ═══════════════════════════════════════════════════════
//  WEBRTC SIGNALING  (unchanged from original)
// ═══════════════════════════════════════════════════════
function buildRTCConfig() {
  const iceServers = STUN_SERVERS.map(url => {
    const match = url.match(/^(turns?):([^:]+):([^@]+)@(.+)$/);
    if (match) {
      const [, scheme, username, credential, host] = match;
      return { urls: `${scheme}:${host}`, username, credential };
    }
    return { urls: url };
  });
  return { iceServers };
}

async function loadConfig() {
  if (configLoaded) return;
  try {
    const res = await fetch("/ice-servers", { cache: "no-store" });
    if (res.ok) {
      const data = await res.json();
      const combined = [];
      if (Array.isArray(data.stun)) combined.push(...data.stun);
      if (Array.isArray(data.turn)) combined.push(...data.turn);
      if (!combined.length && Array.isArray(data.stun_servers)) combined.push(...data.stun_servers);
      if (combined.length) STUN_SERVERS = combined.map(String);
    }
  } catch (err) { console.warn("Using default STUN servers", err); }
  finally { configLoaded = true; }
}

function connectSignalChannel() {
  if (signalSocket && (signalSocket.readyState === WebSocket.OPEN || signalSocket.readyState === WebSocket.CONNECTING)) return;
  if (signalReconnectTimer) { clearTimeout(signalReconnectTimer); signalReconnectTimer = null; }
  signalSocket = new WebSocket(SIGNAL_URL);
  signalSocket.addEventListener('open', () => {
    signalReady = true;
    if (signalHeartbeat) clearInterval(signalHeartbeat);
    signalHeartbeat = setInterval(() => sigSend({ type: 'heartbeat' }), SIGNAL_HEARTBEAT_MS);
    sigSend({ type: 'hello', client: 'controller' });
    const queued = [...signalQueue]; signalQueue = [];
    queued.forEach(sigSend);
  });
  signalSocket.addEventListener('message', (event) => {
    try { handleSignalPayload(JSON.parse(event.data)); } catch (err) {}
  });
  signalSocket.addEventListener('close', () => {
    signalReady = false;
    if (signalHeartbeat) { clearInterval(signalHeartbeat); signalHeartbeat = null; }
    scheduleSignalReconnect(); teardownPeer();
  });
  signalSocket.addEventListener('error', (err) => { signalSocket.close(); });
}

function scheduleSignalReconnect() {
  if (signalReconnectTimer) return;
  signalReconnectTimer = setTimeout(() => { signalReconnectTimer = null; connectSignalChannel(); }, SIGNAL_HEARTBEAT_MS);
}

function sigSend(message) {
  if (signalReady && signalSocket && signalSocket.readyState === WebSocket.OPEN)
    signalSocket.send(JSON.stringify(message));
  else signalQueue.push(message);
}

async function handleSignalPayload(payload) {
  const type = (payload.type || '').toLowerCase();
  if (type === 'offer' && payload.offer)   { await setupPeer(payload.offer); return; }
  if (type === 'ice'   && payload.candidate) {
    if (!rtc || !rtc.remoteDescription || rtc.remoteDescription.type === "")
      pendingIceCandidates.push(payload.candidate);
    else try { await rtc.addIceCandidate(new RTCIceCandidate(payload.candidate)); } catch {}
    return;
  }
  if (type === 'peer_left') { teardownPeer(); return; }
  if (type === 'error')     flashError(payload.reason || 'SIGNAL ERR');
}

function updateMicToggleUI() {
  if (!btnMicSend) return;
  btnMicSend.classList.toggle('off', !micPublishEnabled);
  btnMicSend.setAttribute('aria-pressed', micPublishEnabled);
  btnMicSend.textContent = micPublishEnabled ? '🎙️' : '🚫';
}

function refreshCarAudioState() {
  remoteAudioEl.muted = !carAudioEnabled;
  if (btnCarAudio) {
    btnCarAudio.classList.toggle('off', !carAudioEnabled);
    btnCarAudio.setAttribute('aria-pressed', carAudioEnabled);
    btnCarAudio.textContent = carAudioEnabled ? '🔊' : '🔇';
  }
}

function refreshCarVideoState() {
  if (btnCarVideo) {
    btnCarVideo.classList.toggle('off', !carVideoVisible);
    btnCarVideo.setAttribute('aria-pressed', carVideoVisible);
    btnCarVideo.textContent = carVideoVisible ? '🎥' : '🚫';
  }
  if (carVideoVisible) {
    remoteVideo.style.display = '';
    if (remoteVideo.srcObject) remoteVideo.play().catch(() => {});
  } else {
    remoteVideo.style.display = 'none';
    try { remoteVideo.pause(); } catch (_) {}
  }
}

async function ensureMicStream() {
  if (!micPublishEnabled) return null;
  if (micStream && micStream.getAudioTracks().some(t => t.readyState === 'live')) return micStream;
  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true } });
  } catch (err) {
    flashError('MIC BLOCKED'); micStream = null; micPublishEnabled = false;
  }
  updateMicToggleUI();
  return micStream;
}

function attachMicToPeer() {
  if (!rtc || !micStream) return;
  const tracks = micStream.getAudioTracks();
  if (!tracks.length) return;
  if (!micSenders.length) { tracks.forEach(track => micSenders.push(rtc.addTrack(track, micStream))); return; }
  micSenders.forEach(sender => { try { sender.replaceTrack(tracks[0]); } catch {} });
}

function detachMicSenders() {
  micSenders.forEach(sender => { try { sender.replaceTrack(null); } catch {} });
}

function releaseMicStream() {
  if (micStream) micStream.getTracks().forEach(track => { try { track.stop(); } catch {} });
  micStream = null;
}

async function refreshMicPublishState() {
  if (!micPublishEnabled) { detachMicSenders(); releaseMicStream(); updateMicToggleUI(); return; }
  const stream = await ensureMicStream();
  if (!stream) { micPublishEnabled = false; updateMicToggleUI(); return; }
  if (rtc) attachMicToPeer();
  updateMicToggleUI();
}

async function setupPeer(offer) {
  teardownPeer();
  rtc = new RTCPeerConnection(buildRTCConfig());
  micSenders = [];

  rtc.ontrack = (event) => {
    const track = event.track;
    if (track.kind === 'video') {
      const stream = event.streams[0] || new MediaStream([track]);
      remoteVideo.srcObject = stream;
      refreshCarVideoState();
      remoteVideo.play().catch(() => {});
    } else if (track.kind === 'audio') {
      const stream = event.streams[0] || new MediaStream([track]);
      remoteAudioEl.srcObject = stream;
      refreshCarAudioState();
    }
  };

  rtc.onicecandidate = (event) => {
    if (event.candidate) sigSend({ type: 'ice', candidate: event.candidate });
  };

  rtc.oniceconnectionstatechange = () => {
    const state = rtc.iceConnectionState;
    if (state === 'failed' || state === 'disconnected' || state === 'closed') {
      flashError('RTC LOST'); teardownPeer();
    }
  };

  await rtc.setRemoteDescription(new RTCSessionDescription(offer));

  const audioTransceiver = rtc.getTransceivers().find(t => t.receiver.track.kind === 'audio');
  if (audioTransceiver) {
    micTransceiver = audioTransceiver;
    audioTransceiver.direction = 'sendrecv';
    micSenders.push(audioTransceiver.sender);
  }

  if (micPublishEnabled) {
    const stream = await ensureMicStream();
    if (stream) attachMicToPeer();
    else { micPublishEnabled = false; detachMicSenders(); updateMicToggleUI(); }
  } else {
    detachMicSenders();
  }

  const answer = await rtc.createAnswer();
  await rtc.setLocalDescription(answer);
  sigSend({ type: 'answer', answer: rtc.localDescription });

  for (const candidate of pendingIceCandidates) {
    try { await rtc.addIceCandidate(new RTCIceCandidate(candidate)); } catch {}
  }
  pendingIceCandidates = [];
}

function teardownPeer() {
  if (rtc) { try { rtc.close(); } catch {} }
  rtc = null; micSenders = []; micTransceiver = null;
  if (remoteVideo) { try { remoteVideo.pause(); } catch {} remoteVideo.srcObject = null; }
  if (remoteAudioEl) remoteAudioEl.srcObject = null;
  pendingIceCandidates = [];
  refreshCarAudioState(); refreshCarVideoState();
}

async function requestFullscreen(element) {
  const target = element || document.documentElement;
  if (document.fullscreenElement) return;
  const method = target.requestFullscreen || target.webkitRequestFullscreen || target.msRequestFullscreen;
  if (!method) return;
  try { await method.call(target); } catch {}
}

async function bootstrapControl() {
  if (controlBootstrapped) return;
  controlBootstrapped = true;
  if (fsPrompt) fsPrompt.classList.add('hidden');
  await loadConfig();
  connectSignalChannel();
  connectCtrl();
}

// ── Media button handlers ──────────────────────────────
btnMicSend.addEventListener('click',  async () => { micPublishEnabled = !micPublishEnabled; await refreshMicPublishState(); });
btnCarAudio.addEventListener('click', ()       => { carAudioEnabled   = !carAudioEnabled;   refreshCarAudioState(); });
btnCarVideo.addEventListener('click', ()       => { carVideoVisible   = !carVideoVisible;   refreshCarVideoState(); });

// ── Boot ───────────────────────────────────────────────
setControlsEnabled(false);
setLinkDisplay('OFFLINE', false);
updateMicToggleUI(); refreshCarAudioState(); refreshCarVideoState();
refreshJoystickManager();

window.addEventListener('focus', () => {
  if (!controlBootstrapped) return;
  connectSignalChannel(); connectCtrl();
});

window.addEventListener('beforeunload', () => {
  destroyJoystickManager();
  if (socket)       try { socket.close();       } catch {}
  if (signalSocket) try { signalSocket.close();  } catch {}
});

if (fsButton) {
  fsButton.addEventListener('click', async () => {
    await requestFullscreen(document.documentElement);
    await bootstrapControl();
  });
}

window.addEventListener('load', () => {
  if (fsPrompt) {
    fsPrompt.classList.remove('hidden');
    try { fsButton.focus(); } catch {}
  } else {
    bootstrapControl();
  }
});
</script>
