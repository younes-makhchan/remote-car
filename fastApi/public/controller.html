<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apex T-Control v3</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #38bdf8;
      --accent-glow: rgba(56, 189, 248, 0.35);
      --danger: #f87171;
      --panel-bg: rgba(10, 16, 28, 0.55);
      --panel-border: rgba(56, 189, 248, 0.18);
      --text-muted: rgba(203, 213, 225, 0.65);
      --thumb: rgba(56, 189, 248, 0.85);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'JetBrains Mono', monospace;
      background: #04070d;
      color: #e2e8f0;
      min-height: 100vh;
      height: 100vh;
      overflow: hidden;
      user-select: none;
      touch-action: none;
    }

    .fs-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(4, 7, 13, 0.94);
      backdrop-filter: blur(14px);
      z-index: 50;
      transition: opacity 0.25s ease;
      opacity: 1;
    }
    .fs-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .fs-card {
      background: rgba(10, 16, 28, 0.92);
      border: 1px solid rgba(56, 189, 248, 0.25);
      border-radius: 24px;
      padding: 36px 42px;
      max-width: 360px;
      width: 90%;
      text-align: center;
      box-shadow: 0 24px 70px rgba(8, 11, 19, 0.62);
    }
    .fs-card h2 {
      font-family: 'Orbitron', sans-serif;
      font-size: 18px;
      letter-spacing: 0.3em;
      color: #38bdf8;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .fs-card p {
      font-size: 11px;
      letter-spacing: 0.16em;
      color: rgba(148, 163, 184, 0.8);
      text-transform: uppercase;
      margin-bottom: 26px;
    }
    .fs-card button {
      padding: 12px 28px;
      border-radius: 16px;
      border: 1px solid rgba(56, 189, 248, 0.45);
      background: rgba(56, 189, 248, 0.1);
      color: #e2e8f0;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease;
    }
    .fs-card button:hover {
      background: rgba(244, 114, 182, 0.12);
      border-color: #f472b6;
      color: #f472b6;
    }

    /* ─── Video background ─── */
    #remote-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: saturate(1.05);
      z-index: 0;
    }
    #remote-audio { display: none; }

    /* ─── HUD root ─── */
    .hud {
      position: relative;
      z-index: 10;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
      pointer-events: none;
    }

    /* ─── Top bar ─── */
    .hud-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      pointer-events: none;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(8, 13, 22, 0.6);
      border: 1px solid rgba(56, 189, 248, 0.2);
      border-radius: 999px;
      padding: 6px 14px;
      backdrop-filter: blur(14px);
      pointer-events: auto;
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #475569;
      transition: background 0.3s;
      flex-shrink: 0;
    }
    .status-dot.online { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
    .status-pill-text {
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .status-pill-text strong {
      color: var(--accent);
      font-weight: 700;
    }

    .media-row {
      display: flex;
      gap: 8px;
      pointer-events: auto;
    }
    .media-btn {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: rgba(8, 13, 22, 0.65);
      border: 1px solid rgba(56, 189, 248, 0.28);
      color: var(--accent);
      font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(12px);
      transition: transform 0.12s, background 0.2s, opacity 0.2s;
      cursor: pointer;
    }
    .media-btn.off {
      background: rgba(15, 23, 42, 0.4);
      color: rgba(148, 163, 184, 0.8);
      border-color: rgba(148, 163, 184, 0.28);
      opacity: 0.7;
    }
    .media-btn.active {
      background: rgba(56, 189, 248, 0.16);
      border-color: rgba(125, 211, 252, 0.5);
      color: #f8fafc;
      box-shadow: 0 0 18px rgba(56, 189, 248, 0.22);
    }
    .media-btn:active { transform: scale(0.92); }

    .settings-panel {
      position: fixed;
      top: calc(max(16px, env(safe-area-inset-top)) + 52px);
      right: max(16px, env(safe-area-inset-right));
      width: min(280px, calc(100vw - 32px));
      padding: 14px;
      border-radius: 18px;
      background: rgba(8, 13, 22, 0.8);
      border: 1px solid rgba(56, 189, 248, 0.18);
      backdrop-filter: blur(16px);
      box-shadow: 0 18px 40px rgba(2, 6, 23, 0.32);
      pointer-events: auto;
      opacity: 0;
      transform: translateY(-8px);
      transition: opacity 0.18s ease, transform 0.18s ease;
      z-index: 14;
    }
    .settings-panel.hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateY(-8px);
    }
    .settings-panel:not(.hidden) {
      opacity: 1;
      transform: translateY(0);
    }
    .settings-panel h3 {
      font-family: 'Orbitron', sans-serif;
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #f8fafc;
      margin-bottom: 8px;
    }
    .settings-panel p {
      font-size: 10px;
      line-height: 1.5;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(226, 232, 240, 0.68);
      margin-bottom: 12px;
    }
    .settings-actions {
      display: flex;
      gap: 8px;
    }
    .settings-btn {
      flex: 1;
      border: 1px solid rgba(56, 189, 248, 0.24);
      background: rgba(15, 23, 42, 0.7);
      color: #e2e8f0;
      border-radius: 14px;
      padding: 10px 12px;
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.18s ease, border-color 0.18s ease, color 0.18s ease;
    }
    .settings-btn:hover,
    .settings-btn.active {
      background: rgba(56, 189, 248, 0.14);
      border-color: rgba(125, 211, 252, 0.48);
      color: #f8fafc;
    }

    .joystick-overlay {
      position: fixed;
      left: max(12px, env(safe-area-inset-left));
      bottom: max(12px, env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      pointer-events: auto;
      z-index: 12;
      --joystick-size: 168px;
    }
    .joystick-overlay.editing {
      z-index: 15;
    }
    .joystick-overlay.editing .joystick-card {
      padding: 10px;
      border-radius: 26px;
      background: rgba(8, 13, 22, 0.38);
      border: 1px dashed rgba(125, 211, 252, 0.34);
      box-shadow: 0 14px 32px rgba(2, 6, 23, 0.26);
      backdrop-filter: blur(12px);
    }
    .joystick-overlay.editing .joystick-header {
      background: rgba(56, 189, 248, 0.12);
      border-color: rgba(125, 211, 252, 0.32);
      color: rgba(248, 250, 252, 0.88);
    }
    .joystick-card {
      background: transparent;
      border: none;
      border-radius: 0;
      padding: 0;
      backdrop-filter: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
      width: auto;
    }
    .joystick-header {
      width: auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 8px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(226, 232, 240, 0.64);
      background: rgba(8, 13, 22, 0.26);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      padding: 4px 8px;
    }
    .joystick-header span:first-child { display: none; }
    #joystick-state {
      color: rgba(255, 255, 255, 0.92);
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      letter-spacing: 0.14em;
    }
    .joystick-shell {
      position: relative;
      width: var(--joystick-size);
      aspect-ratio: 1;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background:
        radial-gradient(circle at center, rgba(255, 255, 255, 0.12) 0, rgba(255, 255, 255, 0.05) 24%, rgba(15, 23, 42, 0.34) 70%, rgba(2, 6, 23, 0.44) 100%);
      box-shadow: inset 0 0 30px rgba(255, 255, 255, 0.05), 0 12px 24px rgba(2, 6, 23, 0.18);
      touch-action: none;
      user-select: none;
      cursor: grab;
    }
    .joystick-shell.disabled {
      opacity: 0.35;
      filter: saturate(0.3);
      cursor: not-allowed;
    }
    .joystick-overlay.editing .joystick-shell {
      cursor: grab;
    }
    .joystick-shell::before,
    .joystick-shell::after {
      content: '';
      position: absolute;
      inset: 50%;
      background: rgba(148, 163, 184, 0.16);
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    .joystick-shell::before {
      width: 74%;
      height: 1px;
    }
    .joystick-shell::after {
      width: 1px;
      height: 74%;
    }
    .joystick-ring {
      position: absolute;
      inset: 14%;
      border-radius: 50%;
      border: 1px dashed rgba(255, 255, 255, 0.1);
      pointer-events: none;
    }
    .joystick-knob {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 34%;
      aspect-ratio: 1;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.92) 0, rgba(186, 230, 253, 0.72) 40%, rgba(15, 23, 42, 0.82) 100%);
      border: 2px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 18px rgba(255, 255, 255, 0.16), inset 0 0 18px rgba(255, 255, 255, 0.14);
      transform: translate(-50%, -50%);
      transition: transform 0.08s linear, box-shadow 0.12s ease;
      pointer-events: none;
    }
    .joystick-shell.active .joystick-knob {
      box-shadow: 0 0 24px rgba(255, 255, 255, 0.24), inset 0 0 18px rgba(255, 255, 255, 0.18);
    }
    .joystick-label {
      position: absolute;
      font-size: 8px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.42);
      pointer-events: none;
    }
    .joystick-label.top { top: 12px; left: 50%; transform: translateX(-50%); }
    .joystick-label.bottom { bottom: 12px; left: 50%; transform: translateX(-50%); }
    .joystick-label.left { left: 12px; top: 50%; transform: translateY(-50%); }
    .joystick-label.right { right: 12px; top: 50%; transform: translateY(-50%); }
    .joystick-resize-handle {
      position: absolute;
      right: 2px;
      bottom: 0;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1px solid rgba(125, 211, 252, 0.34);
      background: rgba(8, 13, 22, 0.76);
      color: rgba(248, 250, 252, 0.86);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transform: translate(28%, 24%);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease, transform 0.18s ease;
      touch-action: none;
      cursor: nwse-resize;
      box-shadow: 0 10px 24px rgba(2, 6, 23, 0.28);
    }
    .joystick-overlay.editing .joystick-resize-handle {
      opacity: 1;
      pointer-events: auto;
    }
    @media (max-width: 720px) {
      .settings-panel {
        top: calc(max(16px, env(safe-area-inset-top)) + 48px);
      }
    }
  </style>
</head>
<body>

<video id="remote-video" autoplay playsinline muted></video>
<audio id="remote-audio" autoplay playsinline></audio>

<div id="ctrlFsPrompt" class="fs-overlay">
  <div class="fs-card">
    <h2>Enter Full Screen</h2>
    <p>Click below to engage control mode</p>
    <button id="ctrlFsButton" type="button">Go Full Screen</button>
  </div>
</div>

<div class="hud">

  <!-- TOP BAR -->
  <div class="hud-top">
    <div class="status-pill">
      <div class="status-dot" id="status-dot"></div>
      <span class="status-pill-text">
        Latency <strong><span id="ms-val">--</span>ms</strong>
        &nbsp;|&nbsp;
        <span id="link-status">OFFLINE</span>
      </span>
    </div>
    <div class="media-row">
      <button id="btnMicSend" class="media-btn" type="button" aria-pressed="true" title="Toggle Mic Send">🎙️</button>
      <button id="btnCarAudio" class="media-btn" type="button" aria-pressed="true" title="Toggle Car Audio">🔊</button>
      <button id="btnCarVideo" class="media-btn" type="button" aria-pressed="true" title="Toggle Car Video">🎥</button>
      <button id="btnSettings" class="media-btn" type="button" aria-pressed="false" title="Joystick Settings">⚙️</button>
    </div>
  </div>

  <div id="settingsPanel" class="settings-panel hidden">
    <h3>Stick Layout</h3>
    <p id="settingsSummary">Open edit mode, drag the stick to place it, then drag the corner handle to resize it.</p>
    <div class="settings-actions">
      <button id="btnLayoutEdit" class="settings-btn" type="button">Edit Layout</button>
      <button id="btnLayoutReset" class="settings-btn" type="button">Reset</button>
    </div>
  </div>

  <div id="joystick-overlay" class="joystick-overlay">
    <div class="joystick-card">
      <div class="joystick-header">
        <span>Drive Stick</span>
        <span id="joystick-state">IDLE</span>
      </div>
      <div class="joystick-shell" id="joystick" aria-label="Drive joystick" role="application">
        <div class="joystick-ring"></div>
        <span class="joystick-label top">F</span>
        <span class="joystick-label right">R</span>
        <span class="joystick-label bottom">B</span>
        <span class="joystick-label left">L</span>
        <div class="joystick-knob" id="joystick-knob"></div>
      </div>
      <button id="joystick-resize-handle" class="joystick-resize-handle" type="button" aria-label="Resize joystick">⤡</button>
    </div>
  </div>
</div>

<script>
  const HEARTBEAT_INTERVAL_MS = 2000;
  const MAX_RECONNECT_DELAY_MS = 5000;
  const WS_URL = `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}/ctrl`;
  const SIGNAL_URL = `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}/ws?role=ctrl`;
  const SIGNAL_HEARTBEAT_MS = 5000;
  let STUN_SERVERS = [
    "stun:stunserver2025.stunprotocol.org:3478",
    "turn:USERNAME:PASSWORD@turn.example.com:3478?transport=udp"
  ];

  const msEl = document.getElementById('ms-val');
  const linkStatusEl = document.getElementById('link-status');
  const statusDot = document.getElementById('status-dot');
  const joystick = document.getElementById('joystick');
  const joystickKnob = document.getElementById('joystick-knob');
  const joystickState = document.getElementById('joystick-state');
  const remoteVideo = document.getElementById('remote-video');
  const remoteAudioEl = document.getElementById('remote-audio');
  const btnMicSend = document.getElementById('btnMicSend');
  const btnCarAudio = document.getElementById('btnCarAudio');
  const btnCarVideo = document.getElementById('btnCarVideo');
  const btnSettings = document.getElementById('btnSettings');
  const settingsPanel = document.getElementById('settingsPanel');
  const settingsSummary = document.getElementById('settingsSummary');
  const btnLayoutEdit = document.getElementById('btnLayoutEdit');
  const btnLayoutReset = document.getElementById('btnLayoutReset');
  const joystickOverlay = document.getElementById('joystick-overlay');
  const joystickResizeHandle = document.getElementById('joystick-resize-handle');
  const fsPrompt = document.getElementById('ctrlFsPrompt');
  const fsButton = document.getElementById('ctrlFsButton');

  let socket = null;
  let reconnectDelay = 500;
  let reconnectTimer = null;
  let heartbeatTimer = null;
  let pendingTimes = new Map();
  let stopArmed = false;
  let lastStatusSnapshot = { esp: false, car: false };
  let errorFlashTimer = null;
  let signalSocket = null;
  let signalReady = false;
  let signalHeartbeat = null;
  let signalReconnectTimer = null;
  let signalQueue = [];
  let rtc = null;
  let micStream = null;
  let micSenders = [];
  let micTransceiver = null;
  let configLoaded = false;
  let pendingIceCandidates = [];
  let micPublishEnabled = true;
  let carAudioEnabled = true;
  let carVideoVisible = true;
  let controlBootstrapped = false;
  let controlsEnabled = false;
  let joystickPointerId = null;
  let joystickSentMix = null;
  let joystickTargetMix = null;
  let joystickAppliedMix = null;
  let joystickVector = { x: 0, y: 0 };
  let settingsOpen = false;
  let joystickEditMode = false;
  let joystickLayoutDrag = null;
  let joystickResizeDrag = null;
  let joystickLayoutPointerId = null;
  let joystickResizePointerId = null;
  let joystickSizePx = 168;

  const JOYSTICK_DEADZONE = 0.28;
  const JOYSTICK_DIRECTION_THRESHOLD = 0.24;
  const JOYSTICK_PWM_MIN = 200;
  const JOYSTICK_PWM_MAX = 250;
  const JOYSTICK_PIVOT_THRESHOLD = 0.12;
  const JOYSTICK_ACTIVE_WHEEL_THRESHOLD = 0.10;
  const JOYSTICK_SLEW_INTERVAL_MS = 33;
  const JOYSTICK_SLEW_STEP = 10;
  const JOYSTICK_LAYOUT_STORAGE_KEY = 'apex-t-control.joystick-layout.v1';
  const JOYSTICK_LAYOUT_MARGIN = 12;
  const JOYSTICK_SIZE_MIN = 120;
  const JOYSTICK_SIZE_MAX = 220;
  const JOYSTICK_DEFAULT_LAYOUT = { leftRatio: 0.04, bottomRatio: 0.04, sizeRatio: 0.24 };
  let joystickLayout = loadJoystickLayout();

  function clamp(value, min, max) {
    return Math.min(max, Math.max(min, value));
  }

  function squareSigned(value) {
    return Math.sign(value) * value * value;
  }

  function normalizeWheelMix(left, right) {
    const peak = Math.max(1, Math.abs(left), Math.abs(right));
    return { left: left / peak, right: right / peak };
  }

  function mapWheelToPwm(value) {
    const magnitude = Math.abs(value);
    if (magnitude < JOYSTICK_ACTIVE_WHEEL_THRESHOLD) return 0;
    const scaledRatio = clamp(
      (magnitude - JOYSTICK_ACTIVE_WHEEL_THRESHOLD) / (1 - JOYSTICK_ACTIVE_WHEEL_THRESHOLD),
      0,
      1,
    );
    const pwm = JOYSTICK_PWM_MIN + (scaledRatio * (JOYSTICK_PWM_MAX - JOYSTICK_PWM_MIN));
    return Math.round(Math.sign(value) * pwm);
  }

  function stepToward(current, target, step = JOYSTICK_SLEW_STEP) {
    if (current === target) return current;
    if (current < target) return Math.min(current + step, target);
    return Math.max(current - step, target);
  }

  function clearJoystickDriveState(sendStopCommand = false) {
    const shouldStop = sendStopCommand && stopArmed;
    joystickTargetMix = null;
    joystickAppliedMix = null;
    joystickSentMix = null;
    if (shouldStop) sendStop();
  }

  function loadJoystickLayout() {
    try {
      const raw = localStorage.getItem(JOYSTICK_LAYOUT_STORAGE_KEY);
      if (!raw) return { ...JOYSTICK_DEFAULT_LAYOUT };
      const parsed = JSON.parse(raw);
      const leftRatio = Number(parsed.leftRatio);
      const bottomRatio = Number(parsed.bottomRatio);
      const sizeRatio = Number(parsed.sizeRatio);
      return {
        leftRatio: Number.isFinite(leftRatio) ? clamp(leftRatio, 0, 1) : JOYSTICK_DEFAULT_LAYOUT.leftRatio,
        bottomRatio: Number.isFinite(bottomRatio) ? clamp(bottomRatio, 0, 1) : JOYSTICK_DEFAULT_LAYOUT.bottomRatio,
        sizeRatio: Number.isFinite(sizeRatio) ? clamp(sizeRatio, 0.14, 0.42) : JOYSTICK_DEFAULT_LAYOUT.sizeRatio,
      };
    } catch (err) {
      return { ...JOYSTICK_DEFAULT_LAYOUT };
    }
  }

  function persistJoystickLayout() {
    localStorage.setItem(JOYSTICK_LAYOUT_STORAGE_KEY, JSON.stringify(joystickLayout));
  }

  function currentViewportMin() {
    return Math.max(Math.min(window.innerWidth, window.innerHeight), 1);
  }

  function applyJoystickSize(sizePx) {
    joystickSizePx = clamp(Math.round(sizePx), JOYSTICK_SIZE_MIN, JOYSTICK_SIZE_MAX);
    joystickOverlay.style.setProperty('--joystick-size', `${joystickSizePx}px`);
  }

  function joystickPositionBounds() {
    const width = joystickOverlay.offsetWidth || joystickSizePx;
    const height = joystickOverlay.offsetHeight || joystickSizePx;
    return {
      maxLeft: Math.max(JOYSTICK_LAYOUT_MARGIN, window.innerWidth - width - JOYSTICK_LAYOUT_MARGIN),
      maxBottom: Math.max(JOYSTICK_LAYOUT_MARGIN, window.innerHeight - height - JOYSTICK_LAYOUT_MARGIN),
    };
  }

  function commitJoystickLayout(left, bottom, sizePx = joystickSizePx, persist = true) {
    applyJoystickSize(sizePx);
    const { maxLeft, maxBottom } = joystickPositionBounds();
    const nextLeft = clamp(Math.round(left), JOYSTICK_LAYOUT_MARGIN, maxLeft);
    const nextBottom = clamp(Math.round(bottom), JOYSTICK_LAYOUT_MARGIN, maxBottom);
    joystickOverlay.style.left = `${nextLeft}px`;
    joystickOverlay.style.bottom = `${nextBottom}px`;
    joystickLayout = {
      leftRatio: maxLeft > JOYSTICK_LAYOUT_MARGIN ? nextLeft / maxLeft : 0,
      bottomRatio: maxBottom > JOYSTICK_LAYOUT_MARGIN ? nextBottom / maxBottom : 0,
      sizeRatio: joystickSizePx / currentViewportMin(),
    };
    if (persist) persistJoystickLayout();
  }

  function applyStoredJoystickLayout(persist = false) {
    const sizePx = clamp(Math.round(currentViewportMin() * joystickLayout.sizeRatio), JOYSTICK_SIZE_MIN, JOYSTICK_SIZE_MAX);
    applyJoystickSize(sizePx);
    const { maxLeft, maxBottom } = joystickPositionBounds();
    const left = maxLeft <= JOYSTICK_LAYOUT_MARGIN ? JOYSTICK_LAYOUT_MARGIN : joystickLayout.leftRatio * maxLeft;
    const bottom = maxBottom <= JOYSTICK_LAYOUT_MARGIN ? JOYSTICK_LAYOUT_MARGIN : joystickLayout.bottomRatio * maxBottom;
    commitJoystickLayout(left, bottom, sizePx, persist);
  }

  function currentJoystickPixels() {
    return {
      left: Number.parseFloat(joystickOverlay.style.left) || JOYSTICK_LAYOUT_MARGIN,
      bottom: Number.parseFloat(joystickOverlay.style.bottom) || JOYSTICK_LAYOUT_MARGIN,

function buildRTCConfig() {
  const iceServers = STUN_SERVERS.map(url => {
    const match = url.match(/^(turns?):([^:]+):([^@]+)@(.+)$/);
    if (match) {
      const [, scheme, username, credential, host] = match;
      return {
        urls: `${scheme}:${host}`,
        username,
        credential
      };
    }
    return { urls: url }; // stun: URLs stay as-is
  });

  return { iceServers };
}

  async function loadConfig() {
    if (configLoaded) return;
    try {
      const res = await fetch("/ice-servers", { cache: "no-store" });
      if (res.ok) {
        const data = await res.json();
        const combined = [];
        if (Array.isArray(data.stun)) combined.push(...data.stun);
        if (Array.isArray(data.turn)) combined.push(...data.turn);
        if (!combined.length && Array.isArray(data.stun_servers)) combined.push(...data.stun_servers);
        if (combined.length) STUN_SERVERS = combined.map(String);
        console.log("using the follow stun server: ", STUN_SERVERS)

      }
    } catch (err) {
      console.warn("Using default STUN servers", err);
    } finally {
      configLoaded = true;
    }
  }

  function wsReady() {
    return socket && socket.readyState === WebSocket.OPEN;
  }

  async function requestFullscreen(element) {
    const target = element || document.documentElement;
    if (!target) return Promise.resolve();
    if (document.fullscreenElement) return Promise.resolve();
    const method = target.requestFullscreen || target.webkitRequestFullscreen || target.msRequestFullscreen;
    if (!method) return Promise.resolve();
    try {
      const result = method.call(target);
      if (result && result.catch) {
        await result;
      }
    } catch (err) {
      console.warn('Fullscreen request failed', err);
    }
  }

  async function bootstrapControl() {
    if (controlBootstrapped) return;
    controlBootstrapped = true;

  function setLinkDisplay(text, online = false) {

  function applyLinkStatus() {
    if (!wsReady()) {
      setLinkDisplay('OFFLINE', false);
      setControlsEnabled(false);
      return;
    }
    const missing = [];
    if (!lastStatusSnapshot.esp) missing.push('ESP');
    if (!lastStatusSnapshot.car) missing.push('CAR');
    if (missing.length === 0) {
      setLinkDisplay('ONLINE', true);
      setControlsEnabled(true);
    } else {
      setLinkDisplay(`WAITING ${missing.join('+')}`, false);

  function flashError(reason) {
    clearTimeout(errorFlashTimer);
    linkStatusEl.textContent = `ERR: ${reason}`;
    linkStatusEl.style.color = '#f87171';
    errorFlashTimer = setTimeout(() => {
      linkStatusEl.style.color = '';
      applyLinkStatus();
    }, 2000);
  }

  function recordLatency(key) { pendingTimes.set(key, performance.now()); }
  function fulfillLatency(key) {
    const start = pendingTimes.get(key);
    if (start) {
      msEl.textContent = Math.max(1, Math.round(performance.now() - start));
      pendingTimes.delete(key);
    }
  }

  function updateJoystickVisual(x = 0, y = 0, active = false) {
    joystick.classList.toggle('active', active);
    joystickKnob.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
  }

  function setJoystickStateLabel(dir = null) {
    joystickState.textContent = dir || 'IDLE';
  }

  function resetJoystick(sendStopCommand = false) {
    joystickPointerId = null;
    joystickVector = { x: 0, y: 0 };
    updateJoystickVisual(0, 0, false);
    setJoystickStateLabel(null);
    clearJoystickDriveState(sendStopCommand);
  }

  function resolveJoystickLabel(nx, ny) {
    const vertical = ny <= -JOYSTICK_DIRECTION_THRESHOLD ? 'F' : ny >= JOYSTICK_DIRECTION_THRESHOLD ? 'B' : '';
    const horizontal = nx >= JOYSTICK_DIRECTION_THRESHOLD ? 'R' : nx <= -JOYSTICK_DIRECTION_THRESHOLD ? 'L' : '';
    return `${vertical}${horizontal}` || vertical || horizontal || 'IDLE';
  }

  function computeAnalogDrive(nx, ny) {
    const magnitude = Math.hypot(nx, ny);
    if (magnitude < JOYSTICK_DEADZONE) return { left: 0, right: 0 };
    const remappedMagnitude = clamp((magnitude - JOYSTICK_DEADZONE) / (1 - JOYSTICK_DEADZONE), 0, 1);
    const unitX = magnitude > 0 ? nx / magnitude : 0;
    const unitY = magnitude > 0 ? ny / magnitude : 0;
    const remappedX = unitX * remappedMagnitude;
    const remappedY = unitY * remappedMagnitude;
    const forward = squareSigned(-remappedY);
    const turn = squareSigned(remappedX);

    let left = 0;
    let right = 0;

    if (Math.abs(forward) < JOYSTICK_PIVOT_THRESHOLD) {
      left = -turn;
      right = turn;
    } else if (forward > 0) {
      left = Math.max(0, forward - turn);
      right = Math.max(0, forward + turn);
    } else {
      left = Math.min(0, forward - turn);
      right = Math.min(0, forward + turn);
    }

    const normalized = normalizeWheelMix(left, right);
    return {
      left: mapWheelToPwm(normalized.left),
      right: mapWheelToPwm(normalized.right),
    };
  }

  function sendAnalogDrive(left, right, label) {
    const nextMix = { left, right, label };
    if (joystickSentMix &&
        joystickSentMix.left === left &&
        joystickSentMix.right === right &&
        joystickSentMix.label === label) {
      return true;
    }
    if (!sendWs({ type: 'drive_analog', left, right, label })) {
      flashError('NO LINK');
      return false;
    }
    stopArmed = true;
    joystickSentMix = nextMix;
    return true;
  }

  function applyJoystickTargetMix() {
    if (!joystickTargetMix) return;
    const currentMix = joystickAppliedMix || joystickSentMix || { left: 0, right: 0, label: joystickTargetMix.label };
    const nextMix = {
      left: stepToward(currentMix.left, joystickTargetMix.left),
      right: stepToward(currentMix.right, joystickTargetMix.right),
      label: joystickTargetMix.label,
    };
    joystickAppliedMix = nextMix;
    sendAnalogDrive(nextMix.left, nextMix.right, nextMix.label);
  }

  function refreshAnalogDrive() {
    const { x, y } = joystickVector;
    const magnitude = Math.hypot(x, y);
    if (magnitude < JOYSTICK_DEADZONE) {
      clearJoystickDriveState(true);
      setJoystickStateLabel(null);
      return;
    }
    const label = resolveJoystickLabel(x, y);
    const { left, right } = computeAnalogDrive(x, y);
    if (left === 0 && right === 0) {
      clearJoystickDriveState(true);
      setJoystickStateLabel(null);
      return;
    }
    joystickTargetMix = { left, right, label };
    setJoystickStateLabel(label);
  }

  function updateJoystickFromPoint(clientX, clientY) {
    if (!controlsEnabled || joystickEditMode) return;
    const rect = joystick.getBoundingClientRect();
    const radius = rect.width / 2;
    const knobRadius = joystickKnob.getBoundingClientRect().width / 2;
    const maxDistance = Math.max(radius - knobRadius - 8, 0);
    const rawX = clientX - (rect.left + radius);
    const rawY = clientY - (rect.top + radius);
    const distance = Math.hypot(rawX, rawY);
    const scale = distance > maxDistance && distance > 0 ? maxDistance / distance : 1;
    const x = rawX * scale;
    const y = rawY * scale;
    const normalizedX = maxDistance ? x / maxDistance : 0;
    const normalizedY = maxDistance ? y / maxDistance : 0;
    joystickVector = { x: normalizedX, y: normalizedY };
    updateJoystickVisual(x, y, true);
    refreshAnalogDrive();
  }

  function sendWs(payload) {
    if (!wsReady()) return false;
    try { socket.send(JSON.stringify(payload)); return true; }
    catch (err) { console.error('WS send failed', err); return false; }
  }

  function sendStop(force = false) {
    if (!force && !stopArmed) return;
    stopArmed = false;
    if (!wsReady()) return;
    recordLatency('stop');
    if (!sendWs({ type: 'stop' })) flashError('NO LINK');
  }

  function connectCtrl() {
    clearTimeout(reconnectTimer);
    if (socket && socket.readyState === WebSocket.CONNECTING) return;
    if (wsReady()) return;
    setLinkDisplay('CONNECTING…', false);
    socket = new WebSocket(WS_URL);

    socket.addEventListener('open', () => {
      reconnectDelay = 500;
      msEl.textContent = '--';
      setControlsEnabled(false);
      sendWs({ type: 'hello', client: 'controller', version: '3.0' });
      sendWs({ type: 'status' });
      heartbeatTimer = setInterval(() => sendWs({ type: 'heartbeat' }), HEARTBEAT_INTERVAL_MS);
    });

    socket.addEventListener('message', (event) => {
      try { handleMessage(JSON.parse(event.data)); }
      catch (err) { console.error('Bad payload', err); }
    });

    socket.addEventListener('close', () => {
      clearInterval(heartbeatTimer); heartbeatTimer = null;
      msEl.textContent = '--'; stopArmed = false;
      pendingTimes.clear(); resetJoystick(false); applyLinkStatus();
      scheduleReconnect();
    });

    socket.addEventListener('error', (err) => { console.warn('WS error', err); socket.close(); });
  }

  function scheduleReconnect() {
    if (reconnectTimer) return;
    setLinkDisplay('OFFLINE', false);
    reconnectTimer = setTimeout(() => {
      reconnectTimer = null;
      reconnectDelay = Math.min(reconnectDelay * 1.5, MAX_RECONNECT_DELAY_MS);
      connectCtrl();
    }, reconnectDelay);
  }

  function handleMessage(payload) {
    switch ((payload.type || '').toLowerCase()) {
      case 'ack': handleAck(payload); break;
      case 'status': handleStatus(payload); break;
      case 'error': flashError(payload.reason || 'UNKNOWN'); break;
    }
  }

  function handleAck(payload) {
    fulfillLatency(payload.cmd);
    if (payload.status !== 'ok') {
      flashError(payload.reason || 'FAILED');
      if (payload.cmd === 'drive_analog' || payload.cmd === 'stop') { stopArmed = false; resetJoystick(false); }
      return;
    }
    switch (payload.cmd) {
      case 'drive_analog':
        if (typeof payload.left === 'number' && typeof payload.right === 'number') {
          joystickSentMix = { left: payload.left, right: payload.right, label: payload.label || 'IDLE' };
        }
        break;
      case 'stop': stopArmed = false; resetJoystick(false); break;
    }
    applyLinkStatus();
  }

  function handleStatus(payload) {
    lastStatusSnapshot = { esp: !!payload.esp?.connected, car: !!payload.car?.connected };
    applyLinkStatus();
  }

  // Signal / WebRTC
  function connectSignalChannel() {
    if (signalSocket && (signalSocket.readyState === WebSocket.OPEN || signalSocket.readyState === WebSocket.CONNECTING)) return;
    if (signalReconnectTimer) { clearTimeout(signalReconnectTimer); signalReconnectTimer = null; }
    signalSocket = new WebSocket(SIGNAL_URL);
    signalSocket.addEventListener('open', () => {
      signalReady = true;
      if (signalHeartbeat) clearInterval(signalHeartbeat);
      signalHeartbeat = setInterval(() => sigSend({ type: 'heartbeat' }), SIGNAL_HEARTBEAT_MS);
      sigSend({ type: 'hello', client: 'controller' });
      const queued = [...signalQueue]; signalQueue = [];
      queued.forEach(sigSend);
    });
    signalSocket.addEventListener('message', (event) => {
      try { handleSignalPayload(JSON.parse(event.data)); } catch (err) { console.error('Signal payload error', err); }
    });
    signalSocket.addEventListener('close', () => {
      signalReady = false;
      if (signalHeartbeat) { clearInterval(signalHeartbeat); signalHeartbeat = null; }
      scheduleSignalReconnect(); teardownPeer();
    });
    signalSocket.addEventListener('error', (err) => { console.warn('Signal error', err); signalSocket.close(); });
  }

  function scheduleSignalReconnect() {
    if (signalReconnectTimer) return;
    signalReconnectTimer = setTimeout(() => { signalReconnectTimer = null; connectSignalChannel(); }, SIGNAL_HEARTBEAT_MS);
  }

  function sigSend(message) {
    if (signalReady && signalSocket && signalSocket.readyState === WebSocket.OPEN) {
      signalSocket.send(JSON.stringify(message));
    } else { signalQueue.push(message); }
  }

  async function handleSignalPayload(payload) {
    const type = (payload.type || '').toLowerCase();
    if (type === 'offer' && payload.offer) { await setupPeer(payload.offer); return; }
    if (type === 'ice' && payload.candidate) {
      if (!rtc || !rtc.remoteDescription || rtc.remoteDescription.type === "") {
        pendingIceCandidates.push(payload.candidate);
      } else {
        try { await rtc.addIceCandidate(new RTCIceCandidate(payload.candidate)); } catch (err) { console.error('ICE add failed', err); }
      }
      return;
    }
    if (type === 'peer_left') { teardownPeer(); return; }
    if (type === 'error') flashError(payload.reason || 'SIGNAL ERR');
  }

  function updateMicToggleUI() {
    if (!btnMicSend) return;
    btnMicSend.classList.toggle('off', !micPublishEnabled);
    btnMicSend.setAttribute('aria-pressed', micPublishEnabled);
    btnMicSend.textContent = micPublishEnabled ? '🎙️' : '🚫';
  }

  function refreshCarAudioState() {
    remoteAudioEl.muted = !carAudioEnabled;
    if (btnCarAudio) {

      btnCarAudio.setAttribute('aria-pressed', carAudioEnabled);

    }
  }

  function refreshCarVideoState() {
    if (btnCarVideo) {
      btnCarVideo.classList.toggle('off', !carVideoVisible);
      btnCarVideo.setAttribute('aria-pressed', carVideoVisible);
      btnCarVideo.textContent = carVideoVisible ? '🎥' : '🚫';

    }

  function detachMicSenders() {
    micSenders.forEach(sender => { try { sender.replaceTrack(null); } catch (err) {} });
  }

  function releaseMicStream() {
    if (micStream) micStream.getTracks().forEach(track => { try { track.stop(); } catch (_) {} });
    micStream = null;
  }

  async function ensureMicStream() {
    if (!micPublishEnabled) return null;
    if (micStream && micStream.getAudioTracks().some(t => t.readyState === 'live')) return micStream;
    try {
      micStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true } });
    } catch (err) {
      flashError('MIC BLOCKED'); micStream = null; micPublishEnabled = false;
    }
    updateMicToggleUI();
    return micStream;
  }

  function attachMicToPeer() {
    if (!rtc || !micStream) return;
    const tracks = micStream.getAudioTracks();
    if (!tracks.length) return;
    if (!micSenders.length) {
      tracks.forEach(track => micSenders.push(rtc.addTrack(track, micStream)));
      return;
    }
    micSenders.forEach(sender => { try { sender.replaceTrack(tracks[0]); } catch (err) {} });
  }

  async function refreshMicPublishState() {
    if (!micPublishEnabled) { detachMicSenders(); releaseMicStream(); updateMicToggleUI(); return; }
    const stream = await ensureMicStream();
    if (!stream) { micPublishEnabled = false; updateMicToggleUI(); return; }
    if (rtc) attachMicToPeer();
    updateMicToggleUI();
  }

async function setupPeer(offer) {
    teardownPeer();
    rtc = new RTCPeerConnection(buildRTCConfig());
    micSenders = [];

    rtc.ontrack = (event) => {
      console.log('[RTC] ontrack fired, kind:', event.track.kind, 'streams:', event.streams.length);
      const track = event.track;

      if (track.kind === 'video') {
        const stream = event.streams[0] || new MediaStream([track]);
        remoteVideo.srcObject = stream;
        console.log('[RTC] video srcObject set');
        refreshCarVideoState();
        remoteVideo.play().catch(e => console.error('[RTC] video.play() failed:', e));
      } else if (track.kind === 'audio') {
        const stream = event.streams[0] || new MediaStream([track]);
        console.log("this is the stream:",stream)
        remoteAudioEl.srcObject = stream;
        refreshCarAudioState();
      }
    };

    rtc.onicecandidate = (event) => {
      if (event.candidate) sigSend({ type: 'ice', candidate: event.candidate });
    };

    rtc.oniceconnectionstatechange = () => {
      const state = rtc.iceConnectionState;
      console.log('[RTC] ICE state:', state);
      if (state === 'failed' || state === 'disconnected' || state === 'closed') {
        flashError('RTC LOST'); teardownPeer();
      }
    };

    rtc.onconnectionstatechange = () => {
      console.log('[RTC] connection state:', rtc.connectionState);
    };

    await rtc.setRemoteDescription(new RTCSessionDescription(offer));
    console.log('[RTC] remote description set, transceivers:', rtc.getTransceivers().map(t => t.receiver.track.kind + ' dir=' + t.direction + ' iceState=' + t.iceTransport?.state));

    const audioTransceiver = rtc.getTransceivers().find(t => t.receiver.track.kind === 'audio');
    if (audioTransceiver) {
      micTransceiver = audioTransceiver;
      audioTransceiver.direction = 'sendrecv';
      micSenders.push(audioTransceiver.sender);
      console.log('[RTC] audio transceiver found, set to sendrecv');
    } else {
      console.warn('[RTC] no audio transceiver found');
    }

    if (micPublishEnabled) {
      const stream = await ensureMicStream();
      if (stream) attachMicToPeer();
      else { micPublishEnabled = false; detachMicSenders(); updateMicToggleUI(); }
    } else {
      detachMicSenders();
    }

    const answer = await rtc.createAnswer();
    await rtc.setLocalDescription(answer);
    console.log('[RTC] answer created and set, sending to car');
    sigSend({ type: 'answer', answer: rtc.localDescription });

    for (const candidate of pendingIceCandidates) {
      try { await rtc.addIceCandidate(new RTCIceCandidate(candidate)); } catch (err) {}
    }
    pendingIceCandidates = [];
}
function teardownPeer() {
    if (rtc) { try { rtc.close(); } catch (_) {} }
    rtc = null; micSenders = []; micTransceiver = null;
    if (remoteVideo) { try { remoteVideo.pause(); } catch (_) {} remoteVideo.srcObject = null; }
    if (remoteAudioEl) remoteAudioEl.srcObject = null;
    pendingIceCandidates = [];
    refreshCarAudioState(); refreshCarVideoState();
  }

  joystick.addEventListener('pointerdown', (e) => {
    if (!controlsEnabled || joystickEditMode) return;
    e.preventDefault();
    joystickPointerId = e.pointerId;
    joystick.setPointerCapture(e.pointerId);
    updateJoystickFromPoint(e.clientX, e.clientY);
  });

  joystick.addEventListener('pointermove', (e) => {
    if (e.pointerId !== joystickPointerId) return;
    e.preventDefault();
    updateJoystickFromPoint(e.clientX, e.clientY);
  });

  const endJoystick = (e) => {
    if (e.pointerId !== joystickPointerId) return;
    e.preventDefault();
    if (joystick.hasPointerCapture(e.pointerId)) joystick.releasePointerCapture(e.pointerId);
    resetJoystick(true);
  };

  joystick.addEventListener('pointerup', endJoystick);
  joystick.addEventListener('pointercancel', endJoystick);

  joystickOverlay.addEventListener('pointerdown', (e) => {
    if (!joystickEditMode) return;
    if (e.target === joystickResizeHandle) return;
    e.preventDefault();
    resetJoystick(true);
    joystickLayoutPointerId = e.pointerId;
    joystickOverlay.setPointerCapture(e.pointerId);
    const { left, bottom } = currentJoystickPixels();
    joystickLayoutDrag = { startX: e.clientX, startY: e.clientY, left, bottom };
  });

  joystickOverlay.addEventListener('pointermove', (e) => {
    if (e.pointerId !== joystickLayoutPointerId || !joystickLayoutDrag) return;
    e.preventDefault();
    const left = joystickLayoutDrag.left + (e.clientX - joystickLayoutDrag.startX);
    const bottom = joystickLayoutDrag.bottom - (e.clientY - joystickLayoutDrag.startY);
    commitJoystickLayout(left, bottom);
  });

  const endJoystickLayoutDrag = (e) => {
    if (e.pointerId !== joystickLayoutPointerId) return;
    e.preventDefault();
    if (joystickOverlay.hasPointerCapture(e.pointerId)) joystickOverlay.releasePointerCapture(e.pointerId);
    joystickLayoutPointerId = null;
    joystickLayoutDrag = null;
  };

  joystickOverlay.addEventListener('pointerup', endJoystickLayoutDrag);
  joystickOverlay.addEventListener('pointercancel', endJoystickLayoutDrag);

  joystickResizeHandle.addEventListener('pointerdown', (e) => {
    if (!joystickEditMode) return;
    e.preventDefault();
    e.stopPropagation();
    resetJoystick(true);
    joystickResizePointerId = e.pointerId;
    joystickResizeHandle.setPointerCapture(e.pointerId);
    const { left, bottom } = currentJoystickPixels();
    joystickResizeDrag = { startX: e.clientX, startY: e.clientY, sizePx: joystickSizePx, left, bottom };
  });

  joystickResizeHandle.addEventListener('pointermove', (e) => {
    if (e.pointerId !== joystickResizePointerId || !joystickResizeDrag) return;
    e.preventDefault();

    commitJoystickLayout(joystickResizeDrag.left, joystickResizeDrag.bottom, joystickResizeDrag.sizePx + delta);

    joystickResizePointerId = null;
    joystickResizeDrag = null;
  };

  joystickResizeHandle.addEventListener('pointerup', endJoystickResize);
  joystickResizeHandle.addEventListener('pointercancel', endJoystickResize);

  btnMicSend.addEventListener('click', async () => { micPublishEnabled = !micPublishEnabled; await refreshMicPublishState(); });
  btnCarAudio.addEventListener('click', () => { carAudioEnabled = !carAudioEnabled; refreshCarAudioState(); });
  btnCarVideo.addEventListener('click', () => { carVideoVisible = !carVideoVisible; refreshCarVideoState(); });
  btnSettings.addEventListener('click', () => { setSettingsOpen(!settingsOpen); });
  btnLayoutEdit.addEventListener('click', () => { setJoystickEditMode(!joystickEditMode); });
  btnLayoutReset.addEventListener('click', () => {
    joystickLayout = { ...JOYSTICK_DEFAULT_LAYOUT };

  });

  setControlsEnabled(false);
  setLinkDisplay('OFFLINE', false);
  updateMicToggleUI(); refreshCarAudioState(); refreshCarVideoState();
  applyStoredJoystickLayout(false);

  const joystickSlewTimer = window.setInterval(applyJoystickTargetMix, JOYSTICK_SLEW_INTERVAL_MS);

  window.addEventListener('focus', () => {
    if (!controlBootstrapped) return;
    connectSignalChannel();
    connectCtrl();
  });
  window.addEventListener('resize', () => { applyStoredJoystickLayout(false); });
  window.addEventListener('beforeunload', () => {
    clearInterval(joystickSlewTimer);
    if (socket) try { socket.close(); } catch (_) {}
    if (signalSocket) try { signalSocket.close(); } catch (_) {}
  });

  if (fsButton) {
    fsButton.addEventListener('click', async () => {
      await requestFullscreen(document.documentElement);
      if (fsPrompt) fsPrompt.classList.add('hidden');
      await bootstrapControl();
    });
  }

  window.addEventListener('load', () => {
    if (fsPrompt) {
      fsPrompt.classList.remove('hidden');
      if (fsButton) {
        try { fsButton.focus(); } catch (_) {}
      }
    } else {
      bootstrapControl();
    }
  });
</script>
</body>
</html>
