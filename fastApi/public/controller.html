<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apex T-Control v3</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #38bdf8;
      --accent-glow: rgba(56, 189, 248, 0.35);
      --danger: #f87171;
      --panel-bg: rgba(10, 16, 28, 0.55);
      --panel-border: rgba(56, 189, 248, 0.18);
      --text-muted: rgba(203, 213, 225, 0.65);
      --thumb: rgba(56, 189, 248, 0.85);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'JetBrains Mono', monospace;
      background: #04070d;
      color: #e2e8f0;
      min-height: 100vh;
      height: 100vh;
      overflow: hidden;
      user-select: none;
      touch-action: none;
    }

    .fs-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(4, 7, 13, 0.94);
      backdrop-filter: blur(14px);
      z-index: 50;
      transition: opacity 0.25s ease;
      opacity: 1;
    }
    .fs-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .fs-card {
      background: rgba(10, 16, 28, 0.92);
      border: 1px solid rgba(56, 189, 248, 0.25);
      border-radius: 24px;
      padding: 36px 42px;
      max-width: 360px;
      width: 90%;
      text-align: center;
      box-shadow: 0 24px 70px rgba(8, 11, 19, 0.62);
    }
    .fs-card h2 {
      font-family: 'Orbitron', sans-serif;
      font-size: 18px;
      letter-spacing: 0.3em;
      color: #38bdf8;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .fs-card p {
      font-size: 11px;
      letter-spacing: 0.16em;
      color: rgba(148, 163, 184, 0.8);
      text-transform: uppercase;
      margin-bottom: 26px;
    }
    .fs-card button {
      padding: 12px 28px;
      border-radius: 16px;
      border: 1px solid rgba(56, 189, 248, 0.45);
      background: rgba(56, 189, 248, 0.1);
      color: #e2e8f0;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease;
    }
    .fs-card button:hover {
      background: rgba(244, 114, 182, 0.12);
      border-color: #f472b6;
      color: #f472b6;
    }

    /* ─── Video background ─── */
    #remote-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: saturate(1.05);
      z-index: 0;
    }
    #remote-audio { display: none; }

    /* ─── HUD root ─── */
    .hud {
      position: relative;
      z-index: 10;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
      pointer-events: none;
    }

    /* ─── Top bar ─── */
    .hud-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      pointer-events: none;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(8, 13, 22, 0.6);
      border: 1px solid rgba(56, 189, 248, 0.2);
      border-radius: 999px;
      padding: 6px 14px;
      backdrop-filter: blur(14px);
      pointer-events: auto;
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #475569;
      transition: background 0.3s;
      flex-shrink: 0;
    }
    .status-dot.online { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
    .status-pill-text {
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .status-pill-text strong {
      color: var(--accent);
      font-weight: 700;
    }

    .media-row {
      display: flex;
      gap: 8px;
      pointer-events: auto;
    }
    .media-btn {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: rgba(8, 13, 22, 0.65);
      border: 1px solid rgba(56, 189, 248, 0.28);
      color: var(--accent);
      font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(12px);
      transition: transform 0.12s, background 0.2s, opacity 0.2s;
      cursor: pointer;
    }
    .media-btn.off {
      background: rgba(15, 23, 42, 0.4);
      color: rgba(148, 163, 184, 0.8);
      border-color: rgba(148, 163, 184, 0.28);
      opacity: 0.7;
    }
    .media-btn.active {
      background: rgba(56, 189, 248, 0.16);
      border-color: rgba(125, 211, 252, 0.5);
      color: #f8fafc;
      box-shadow: 0 0 18px rgba(56, 189, 248, 0.22);
    }
    .media-btn:active { transform: scale(0.92); }

    .joystick-overlay {
      position: fixed;
      left: max(16px, env(safe-area-inset-left));
      bottom: max(16px, env(safe-area-inset-bottom));
      display: flex;
      pointer-events: auto;
      z-index: 12;
      --joystick-size: 172px;
    }
    .joystick-card {
      width: var(--joystick-size);
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
      padding: 12px;
      border-radius: 28px;
      background: rgba(8, 13, 22, 0.34);
      border: 1px solid rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(12px);
      box-shadow: 0 18px 36px rgba(2, 6, 23, 0.24);
    }
    .joystick-header {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 4px;
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(226, 232, 240, 0.64);
    }
    #joystick-state {
      color: rgba(255, 255, 255, 0.92);
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      letter-spacing: 0.14em;
    }
    .joystick-shell {
      position: relative;
      width: var(--joystick-size);
      aspect-ratio: 1;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background:
        radial-gradient(circle at center, rgba(255, 255, 255, 0.1) 0, rgba(255, 255, 255, 0.04) 22%, rgba(15, 23, 42, 0.32) 70%, rgba(2, 6, 23, 0.44) 100%);
      box-shadow: inset 0 0 30px rgba(255, 255, 255, 0.04), 0 12px 24px rgba(2, 6, 23, 0.18);
      touch-action: none;
      user-select: none;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .joystick-shell.disabled {
      opacity: 0.35;
      filter: saturate(0.3);
      pointer-events: none;
    }
    .joystick-shell.active {
      box-shadow: inset 0 0 34px rgba(255, 255, 255, 0.06), 0 12px 30px rgba(56, 189, 248, 0.14);
    }
    .joystick-shell::before,
    .joystick-shell::after {
      content: '';
      position: absolute;
      inset: 50%;
      background: rgba(148, 163, 184, 0.14);
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    .joystick-shell::before {
      width: 74%;
      height: 1px;
    }
    .joystick-shell::after {
      width: 1px;
      height: 74%;
    }
    .joystick-shell .back,
    .joystick-shell .front {
      backdrop-filter: blur(4px);
    }
    .joystick-shell .back {
      background: rgba(56, 189, 248, 0.12) !important;
      border: 1px solid rgba(125, 211, 252, 0.18);
    }
    .joystick-shell .front {
      background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.9) 0, rgba(186, 230, 253, 0.72) 45%, rgba(15, 23, 42, 0.86) 100%) !important;
      border: 2px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 18px rgba(255, 255, 255, 0.16), inset 0 0 18px rgba(255, 255, 255, 0.12);
    }
    @media (max-width: 720px) {
      .joystick-overlay {
        --joystick-size: 156px;
      }
    }
  </style>
</head>
<body>

<video id="remote-video" autoplay playsinline muted></video>
<audio id="remote-audio" autoplay playsinline></audio>

<div id="ctrlFsPrompt" class="fs-overlay">
  <div class="fs-card">
    <h2>Enter Full Screen</h2>
    <p>Click below to engage control mode</p>
    <button id="ctrlFsButton" type="button">Go Full Screen</button>
  </div>
</div>

<div class="hud">

  <!-- TOP BAR -->
  <div class="hud-top">
    <div class="status-pill">
      <div class="status-dot" id="status-dot"></div>
      <span class="status-pill-text">
        Latency <strong><span id="ms-val">--</span>ms</strong>
        &nbsp;|&nbsp;
        <span id="link-status">OFFLINE</span>
      </span>
    </div>
    <div class="media-row">
      <button id="btnMicSend" class="media-btn" type="button" aria-pressed="true" title="Toggle Mic Send">🎙️</button>
      <button id="btnCarAudio" class="media-btn" type="button" aria-pressed="true" title="Toggle Car Audio">🔊</button>
      <button id="btnCarVideo" class="media-btn" type="button" aria-pressed="true" title="Toggle Car Video">🎥</button>
    </div>
  </div>

  <div id="joystick-overlay" class="joystick-overlay">
    <div class="joystick-card">
      <div class="joystick-header">
        <span>Drive</span>
        <span id="joystick-state">IDLE</span>
      </div>
      <div class="joystick-shell" id="joystick" aria-label="Drive joystick" role="application"></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.2/nipplejs.min.js"></script>
<script>
  const HEARTBEAT_INTERVAL_MS = 2000;
  const MAX_RECONNECT_DELAY_MS = 5000;
  const WS_URL = `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}/ctrl`;
  const SIGNAL_URL = `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}/ws?role=ctrl`;
  const SIGNAL_HEARTBEAT_MS = 5000;
  let STUN_SERVERS = [
    "stun:stunserver2025.stunprotocol.org:3478",
    "turn:USERNAME:PASSWORD@turn.example.com:3478?transport=udp"
  ];

  const msEl = document.getElementById('ms-val');
  const linkStatusEl = document.getElementById('link-status');
  const statusDot = document.getElementById('status-dot');
  const joystick = document.getElementById('joystick');
  const joystickState = document.getElementById('joystick-state');
  const remoteVideo = document.getElementById('remote-video');
  const remoteAudioEl = document.getElementById('remote-audio');
  const btnMicSend = document.getElementById('btnMicSend');
  const btnCarAudio = document.getElementById('btnCarAudio');
  const btnCarVideo = document.getElementById('btnCarVideo');
  const fsPrompt = document.getElementById('ctrlFsPrompt');
  const fsButton = document.getElementById('ctrlFsButton');

  let socket = null;
  let reconnectDelay = 500;
  let reconnectTimer = null;
  let heartbeatTimer = null;
  let pendingTimes = new Map();
  let stopArmed = false;
  let lastStatusSnapshot = { esp: false, car: false };
  let errorFlashTimer = null;
  let signalSocket = null;
  let signalReady = false;
  let signalHeartbeat = null;
  let signalReconnectTimer = null;
  let signalQueue = [];
  let rtc = null;
  let micStream = null;
  let micSenders = [];
  let micTransceiver = null;
  let configLoaded = false;
  let pendingIceCandidates = [];
  let micPublishEnabled = true;
  let carAudioEnabled = true;
  let carVideoVisible = true;
  let controlBootstrapped = false;
  let controlsEnabled = false;
  let joystickSentMix = null;
  let joystickManager = null;

  const JOYSTICK_DEADZONE = 0.18;
  const JOYSTICK_DIRECTION_THRESHOLD = 0.24;
  const JOYSTICK_PWM_MAX = 240;
  const JOYSTICK_PWM_MIN = 200;
  const JOYSTICK_NIPPLE_SIZE = 76;
  const JOYSTICK_TURN_GAIN = 1.35;

  function clamp(value, min, max) {
    return Math.min(max, Math.max(min, value));
  }

  function scaleMotorPower(value) {
    const magnitude = Math.abs(value);
    if (magnitude <= 0) return 0;
    const scaledRatio = clamp(magnitude, 0, 1);
    const pwm = JOYSTICK_PWM_MIN + (scaledRatio * (JOYSTICK_PWM_MAX - JOYSTICK_PWM_MIN));
    return Math.round(Math.sign(value) * pwm);
  }

  function clearJoystickDriveState(sendStopCommand = false) {
    const shouldStop = sendStopCommand && stopArmed;
    joystickSentMix = null;
    updateJoystickVisual(false);
    setJoystickStateLabel(null);
    if (shouldStop) sendStop();
  }

  function destroyJoystickManager() {
    if (!joystickManager) return;
    try { joystickManager.destroy(); } catch (_) {}
    joystickManager = null;
  }

  function updateJoystickVisual(active = false) {
    joystick.classList.toggle('active', active);
  }

  function refreshJoystickManager() {
    destroyJoystickManager();
    if (!window.nipplejs || !joystick) return;
    joystickManager = window.nipplejs.create({
      zone: joystick,
      mode: 'static',
      position: { left: '50%', top: '50%' },
      size: JOYSTICK_NIPPLE_SIZE,
      color: 'white',
      fadeTime: 0,
      restOpacity: 0.55,
      restJoystick: true,
      dynamicPage: true,
    });
    joystickManager.on('start', () => {
      if (!controlsEnabled) return;
      updateJoystickVisual(true);
    });
    joystickManager.on('move', (_evt, data) => {
      if (!controlsEnabled || !data) return;
      const vector = data.vector || { x: 0, y: 0 };
      const force = clamp(Number(data.force) || 0, 0, 1);
      updateJoystickVisual(true);
      applyJoystickDrive(
        clamp(-(Number(vector.x) || 0), -1, 1),
        clamp(-(Number(vector.y) || 0), -1, 1),
        force,
      );
    });
    joystickManager.on('end', () => {
      clearJoystickDriveState(true);
    });
  }

function buildRTCConfig() {
  const iceServers = STUN_SERVERS.map(url => {
    const match = url.match(/^(turns?):([^:]+):([^@]+)@(.+)$/);
    if (match) {
      const [, scheme, username, credential, host] = match;
      return {
        urls: `${scheme}:${host}`,
        username,
        credential
      };
    }
    return { urls: url }; // stun: URLs stay as-is
  });

  return { iceServers };
}

  async function loadConfig() {
    if (configLoaded) return;
    try {
      const res = await fetch("/ice-servers", { cache: "no-store" });
      if (res.ok) {
        const data = await res.json();
        const combined = [];
        if (Array.isArray(data.stun)) combined.push(...data.stun);
        if (Array.isArray(data.turn)) combined.push(...data.turn);
        if (!combined.length && Array.isArray(data.stun_servers)) combined.push(...data.stun_servers);
        if (combined.length) STUN_SERVERS = combined.map(String);
        console.log("using the follow stun server: ", STUN_SERVERS)

      }
    } catch (err) {
      console.warn("Using default STUN servers", err);
    } finally {
      configLoaded = true;
    }
  }

  function wsReady() {
    return socket && socket.readyState === WebSocket.OPEN;
  }

  async function requestFullscreen(element) {
    const target = element || document.documentElement;
    if (!target) return Promise.resolve();
    if (document.fullscreenElement) return Promise.resolve();
    const method = target.requestFullscreen || target.webkitRequestFullscreen || target.msRequestFullscreen;
    if (!method) return Promise.resolve();
    try {
      const result = method.call(target);
      if (result && result.catch) {
        await result;
      }
    } catch (err) {
      console.warn('Fullscreen request failed', err);
    }
  }

  async function bootstrapControl() {
    if (controlBootstrapped) return;
    controlBootstrapped = true;
    if (fsPrompt) fsPrompt.classList.add('hidden');
    await loadConfig();
    connectSignalChannel();
    connectCtrl();
  }

  function setControlsEnabled(enabled) {
    controlsEnabled = enabled;
    joystick.classList.toggle('disabled', !enabled);
    joystick.setAttribute('aria-disabled', String(!enabled));
    if (!enabled) resetJoystick(false);
  }

  function setLinkDisplay(text, online = false) {
    linkStatusEl.textContent = text;
    statusDot.classList.toggle('online', online);
  }

  function applyLinkStatus() {
    if (!wsReady()) {
      setLinkDisplay('OFFLINE', false);
      setControlsEnabled(false);
      return;
    }
    const missing = [];
    if (!lastStatusSnapshot.esp) missing.push('ESP');
    if (!lastStatusSnapshot.car) missing.push('CAR');
    if (missing.length === 0) {
      setLinkDisplay('ONLINE', true);
      setControlsEnabled(true);
    } else {
      setLinkDisplay(`WAITING ${missing.join('+')}`, false);
      setControlsEnabled(false);
    }
  }

  function flashError(reason) {
    clearTimeout(errorFlashTimer);
    linkStatusEl.textContent = `ERR: ${reason}`;
    linkStatusEl.style.color = '#f87171';
    errorFlashTimer = setTimeout(() => {
      linkStatusEl.style.color = '';
      applyLinkStatus();
    }, 2000);
  }

  function recordLatency(key) { pendingTimes.set(key, performance.now()); }
  function fulfillLatency(key) {
    const start = pendingTimes.get(key);
    if (start) {
      msEl.textContent = Math.max(1, Math.round(performance.now() - start));
      pendingTimes.delete(key);
    }
  }

  function setJoystickStateLabel(dir = null) {
    joystickState.textContent = dir || 'IDLE';
  }

  function resetJoystick(sendStopCommand = false) {
    clearJoystickDriveState(sendStopCommand);
  }

  function resolveJoystickLabel(x, y) {
    const vertical = y <= -JOYSTICK_DIRECTION_THRESHOLD ? 'F' : y >= JOYSTICK_DIRECTION_THRESHOLD ? 'B' : '';
    const horizontal = x >= JOYSTICK_DIRECTION_THRESHOLD ? 'L' : x <= -JOYSTICK_DIRECTION_THRESHOLD ? 'R' : '';
    return `${vertical}${horizontal}` || vertical || horizontal || 'IDLE';
  }

  function computeDriveMix(x, y, force) {
    const forward = -y * force;
    // This rover is differential drive: stronger curves come from widening the
    // left/right power gap, not from independent FL/FR/BL/BR wheel control.
    const turn = x * force * JOYSTICK_TURN_GAIN;
    const left = clamp(forward - turn, -1, 1);
    const right = clamp(forward + turn, -1, 1);
    return {
      left: scaleMotorPower(left),
      right: scaleMotorPower(right),
      label: resolveJoystickLabel(x, y),
    };
  }

  function sendAnalogDrive(left, right, label) {
    const nextMix = { left, right, label };
    if (joystickSentMix &&
        joystickSentMix.left === left &&
        joystickSentMix.right === right &&
        joystickSentMix.label === label) {
      return true;
    }
    if (!sendWs({ type: 'drive_analog', left, right, label })) {
      flashError('NO LINK');
      return false;
    }
    stopArmed = true;
    joystickSentMix = nextMix;
    return true;
  }

  function applyJoystickDrive(x, y, force) {
    const magnitude = Math.hypot(x, y) * force;
    if (magnitude < JOYSTICK_DEADZONE) {
      clearJoystickDriveState(true);
      return;
    }
    const driveMix = computeDriveMix(x, y, force);
    if (driveMix.left === 0 && driveMix.right === 0) {
      clearJoystickDriveState(true);
      return;
    }
    setJoystickStateLabel(driveMix.label);
    sendAnalogDrive(driveMix.left, driveMix.right, driveMix.label);
  }

  function sendWs(payload) {
    if (!wsReady()) return false;
    try { socket.send(JSON.stringify(payload)); return true; }
    catch (err) { console.error('WS send failed', err); return false; }
  }

  function sendStop(force = false) {
    if (!force && !stopArmed) return;
    stopArmed = false;
    if (!wsReady()) return;
    recordLatency('stop');
    if (!sendWs({ type: 'stop' })) flashError('NO LINK');
  }

  function connectCtrl() {
    clearTimeout(reconnectTimer);
    if (socket && socket.readyState === WebSocket.CONNECTING) return;
    if (wsReady()) return;
    setLinkDisplay('CONNECTING…', false);
    socket = new WebSocket(WS_URL);

    socket.addEventListener('open', () => {
      reconnectDelay = 500;
      msEl.textContent = '--';
      setControlsEnabled(false);
      sendWs({ type: 'hello', client: 'controller', version: '3.0' });
      sendWs({ type: 'status' });
      heartbeatTimer = setInterval(() => sendWs({ type: 'heartbeat' }), HEARTBEAT_INTERVAL_MS);
    });

    socket.addEventListener('message', (event) => {
      try { handleMessage(JSON.parse(event.data)); }
      catch (err) { console.error('Bad payload', err); }
    });

    socket.addEventListener('close', () => {
      clearInterval(heartbeatTimer); heartbeatTimer = null;
      msEl.textContent = '--'; stopArmed = false;
      pendingTimes.clear(); resetJoystick(false); applyLinkStatus();
      scheduleReconnect();
    });

    socket.addEventListener('error', (err) => { console.warn('WS error', err); socket.close(); });
  }

  function scheduleReconnect() {
    if (reconnectTimer) return;
    setLinkDisplay('OFFLINE', false);
    reconnectTimer = setTimeout(() => {
      reconnectTimer = null;
      reconnectDelay = Math.min(reconnectDelay * 1.5, MAX_RECONNECT_DELAY_MS);
      connectCtrl();
    }, reconnectDelay);
  }

  function handleMessage(payload) {
    switch ((payload.type || '').toLowerCase()) {
      case 'ack': handleAck(payload); break;
      case 'status': handleStatus(payload); break;
      case 'error': flashError(payload.reason || 'UNKNOWN'); break;
    }
  }

  function handleAck(payload) {
    fulfillLatency(payload.cmd);
    if (payload.status !== 'ok') {
      flashError(payload.reason || 'FAILED');
      if (payload.cmd === 'drive_analog' || payload.cmd === 'stop') { stopArmed = false; resetJoystick(false); }
      return;
    }
    switch (payload.cmd) {
      case 'stop':
        stopArmed = false;
        resetJoystick(false);
        break;
    }
    applyLinkStatus();
  }

  function handleStatus(payload) {
    lastStatusSnapshot = { esp: !!payload.esp?.connected, car: !!payload.car?.connected };
    applyLinkStatus();
  }

  // Signal / WebRTC
  function connectSignalChannel() {
    if (signalSocket && (signalSocket.readyState === WebSocket.OPEN || signalSocket.readyState === WebSocket.CONNECTING)) return;
    if (signalReconnectTimer) { clearTimeout(signalReconnectTimer); signalReconnectTimer = null; }
    signalSocket = new WebSocket(SIGNAL_URL);
    signalSocket.addEventListener('open', () => {
      signalReady = true;
      if (signalHeartbeat) clearInterval(signalHeartbeat);
      signalHeartbeat = setInterval(() => sigSend({ type: 'heartbeat' }), SIGNAL_HEARTBEAT_MS);
      sigSend({ type: 'hello', client: 'controller' });
      const queued = [...signalQueue]; signalQueue = [];
      queued.forEach(sigSend);
    });
    signalSocket.addEventListener('message', (event) => {
      try { handleSignalPayload(JSON.parse(event.data)); } catch (err) { console.error('Signal payload error', err); }
    });
    signalSocket.addEventListener('close', () => {
      signalReady = false;
      if (signalHeartbeat) { clearInterval(signalHeartbeat); signalHeartbeat = null; }
      scheduleSignalReconnect(); teardownPeer();
    });
    signalSocket.addEventListener('error', (err) => { console.warn('Signal error', err); signalSocket.close(); });
  }

  function scheduleSignalReconnect() {
    if (signalReconnectTimer) return;
    signalReconnectTimer = setTimeout(() => { signalReconnectTimer = null; connectSignalChannel(); }, SIGNAL_HEARTBEAT_MS);
  }

  function sigSend(message) {
    if (signalReady && signalSocket && signalSocket.readyState === WebSocket.OPEN) {
      signalSocket.send(JSON.stringify(message));
    } else { signalQueue.push(message); }
  }

  async function handleSignalPayload(payload) {
    const type = (payload.type || '').toLowerCase();
    if (type === 'offer' && payload.offer) { await setupPeer(payload.offer); return; }
    if (type === 'ice' && payload.candidate) {
      if (!rtc || !rtc.remoteDescription || rtc.remoteDescription.type === "") {
        pendingIceCandidates.push(payload.candidate);
      } else {
        try { await rtc.addIceCandidate(new RTCIceCandidate(payload.candidate)); } catch (err) { console.error('ICE add failed', err); }
      }
      return;
    }
    if (type === 'peer_left') { teardownPeer(); return; }
    if (type === 'error') flashError(payload.reason || 'SIGNAL ERR');
  }

  function updateMicToggleUI() {
    if (!btnMicSend) return;
    btnMicSend.classList.toggle('off', !micPublishEnabled);
    btnMicSend.setAttribute('aria-pressed', micPublishEnabled);
    btnMicSend.textContent = micPublishEnabled ? '🎙️' : '🚫';
  }

  function refreshCarAudioState() {
    remoteAudioEl.muted = !carAudioEnabled;
    if (btnCarAudio) {
      btnCarAudio.classList.toggle('off', !carAudioEnabled);
      btnCarAudio.setAttribute('aria-pressed', carAudioEnabled);
      btnCarAudio.textContent = carAudioEnabled ? '🔊' : '🔇';
    }
  }

  function refreshCarVideoState() {
    if (btnCarVideo) {
      btnCarVideo.classList.toggle('off', !carVideoVisible);
      btnCarVideo.setAttribute('aria-pressed', carVideoVisible);
      btnCarVideo.textContent = carVideoVisible ? '🎥' : '🚫';
    }
    if (carVideoVisible) {
      remoteVideo.style.display = '';
      if (remoteVideo.srcObject) remoteVideo.play().catch(() => {});
    } else {
      remoteVideo.style.display = 'none';
      try { remoteVideo.pause(); } catch (_) {}
    }
  }

  function detachMicSenders() {
    micSenders.forEach(sender => { try { sender.replaceTrack(null); } catch (err) {} });
  }

  function releaseMicStream() {
    if (micStream) micStream.getTracks().forEach(track => { try { track.stop(); } catch (_) {} });
    micStream = null;
  }

  async function ensureMicStream() {
    if (!micPublishEnabled) return null;
    if (micStream && micStream.getAudioTracks().some(t => t.readyState === 'live')) return micStream;
    try {
      micStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true } });
    } catch (err) {
      flashError('MIC BLOCKED'); micStream = null; micPublishEnabled = false;
    }
    updateMicToggleUI();
    return micStream;
  }

  function attachMicToPeer() {
    if (!rtc || !micStream) return;
    const tracks = micStream.getAudioTracks();
    if (!tracks.length) return;
    if (!micSenders.length) {
      tracks.forEach(track => micSenders.push(rtc.addTrack(track, micStream)));
      return;
    }
    micSenders.forEach(sender => { try { sender.replaceTrack(tracks[0]); } catch (err) {} });
  }

  async function refreshMicPublishState() {
    if (!micPublishEnabled) { detachMicSenders(); releaseMicStream(); updateMicToggleUI(); return; }
    const stream = await ensureMicStream();
    if (!stream) { micPublishEnabled = false; updateMicToggleUI(); return; }
    if (rtc) attachMicToPeer();
    updateMicToggleUI();
  }

async function setupPeer(offer) {
    teardownPeer();
    rtc = new RTCPeerConnection(buildRTCConfig());
    micSenders = [];

    rtc.ontrack = (event) => {
      console.log('[RTC] ontrack fired, kind:', event.track.kind, 'streams:', event.streams.length);
      const track = event.track;

      if (track.kind === 'video') {
        const stream = event.streams[0] || new MediaStream([track]);
        remoteVideo.srcObject = stream;
        console.log('[RTC] video srcObject set');
        refreshCarVideoState();
        remoteVideo.play().catch(e => console.error('[RTC] video.play() failed:', e));
      } else if (track.kind === 'audio') {
        const stream = event.streams[0] || new MediaStream([track]);
        console.log("this is the stream:",stream)
        remoteAudioEl.srcObject = stream;
        refreshCarAudioState();
      }
    };

    rtc.onicecandidate = (event) => {
      if (event.candidate) sigSend({ type: 'ice', candidate: event.candidate });
    };

    rtc.oniceconnectionstatechange = () => {
      const state = rtc.iceConnectionState;
      console.log('[RTC] ICE state:', state);
      if (state === 'failed' || state === 'disconnected' || state === 'closed') {
        flashError('RTC LOST'); teardownPeer();
      }
    };

    rtc.onconnectionstatechange = () => {
      console.log('[RTC] connection state:', rtc.connectionState);
    };

    await rtc.setRemoteDescription(new RTCSessionDescription(offer));
    console.log('[RTC] remote description set, transceivers:', rtc.getTransceivers().map(t => t.receiver.track.kind + ' dir=' + t.direction + ' iceState=' + t.iceTransport?.state));

    const audioTransceiver = rtc.getTransceivers().find(t => t.receiver.track.kind === 'audio');
    if (audioTransceiver) {
      micTransceiver = audioTransceiver;
      audioTransceiver.direction = 'sendrecv';
      micSenders.push(audioTransceiver.sender);
      console.log('[RTC] audio transceiver found, set to sendrecv');
    } else {
      console.warn('[RTC] no audio transceiver found');
    }

    if (micPublishEnabled) {
      const stream = await ensureMicStream();
      if (stream) attachMicToPeer();
      else { micPublishEnabled = false; detachMicSenders(); updateMicToggleUI(); }
    } else {
      detachMicSenders();
    }

    const answer = await rtc.createAnswer();
    await rtc.setLocalDescription(answer);
    console.log('[RTC] answer created and set, sending to car');
    sigSend({ type: 'answer', answer: rtc.localDescription });

    for (const candidate of pendingIceCandidates) {
      try { await rtc.addIceCandidate(new RTCIceCandidate(candidate)); } catch (err) {}
    }
    pendingIceCandidates = [];
}
  function teardownPeer() {
    if (rtc) { try { rtc.close(); } catch (_) {} }
    rtc = null; micSenders = []; micTransceiver = null;
    if (remoteVideo) { try { remoteVideo.pause(); } catch (_) {} remoteVideo.srcObject = null; }
    if (remoteAudioEl) remoteAudioEl.srcObject = null;
    pendingIceCandidates = [];
    refreshCarAudioState(); refreshCarVideoState();
  }

  btnMicSend.addEventListener('click', async () => { micPublishEnabled = !micPublishEnabled; await refreshMicPublishState(); });
  btnCarAudio.addEventListener('click', () => { carAudioEnabled = !carAudioEnabled; refreshCarAudioState(); });
  btnCarVideo.addEventListener('click', () => { carVideoVisible = !carVideoVisible; refreshCarVideoState(); });

  setControlsEnabled(false);
  setLinkDisplay('OFFLINE', false);
  updateMicToggleUI(); refreshCarAudioState(); refreshCarVideoState();
  refreshJoystickManager();

  window.addEventListener('focus', () => {
    if (!controlBootstrapped) return;
    connectSignalChannel();
    connectCtrl();
  });
  window.addEventListener('beforeunload', () => {
    destroyJoystickManager();
    if (socket) try { socket.close(); } catch (_) {}
    if (signalSocket) try { signalSocket.close(); } catch (_) {}
  });

  if (fsButton) {
    fsButton.addEventListener('click', async () => {
      await requestFullscreen(document.documentElement);
      if (fsPrompt) fsPrompt.classList.add('hidden');
      await bootstrapControl();
    });
  }

  window.addEventListener('load', () => {
    if (fsPrompt) {
      fsPrompt.classList.remove('hidden');
      if (fsButton) {
        try { fsButton.focus(); } catch (_) {}
      }
    } else {
      bootstrapControl();
    }
  });
</script>
</body>
</html>
